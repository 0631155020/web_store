<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа</title>
    <link rel="stylesheet" href="/static/css/checkout.css">
</head>
<body>
    <div class="container">
        <div class="checkout-form">
            <h2>Checkout</h2>
            <form id="delivery-form">
                <input type="email" name="email" placeholder="Email*" required>
                <div class="name-fields">
                    <input type="text" name="firstName" placeholder="First Name*" required>
                    <input type="text" name="lastName" placeholder="Last Name*" required>
                </div>
                <input type="text" name="address" placeholder="Start typing address" required>
                <input type="tel" name="phone" placeholder="Phone Number*" required>

                <div class="delivery-section">
                    <h4>Способ доставки</h4>
                    <div class="delivery-option">
                        <input type="radio" id="rozetka" name="deliveryMethod" value="rozetka" checked>
                        <label for="rozetka">Магазини Rozetka</label>
                    </div>
                    <div class="delivery-option">
                        <input type="radio" id="nova-poshta" name="deliveryMethod" value="nova-poshta">
                        <label for="nova-poshta">Нова Пошта</label>
                    </div>
                    <div id="nova-poshta-details" class="delivery-details" style="display: none;">
                        <div class="delivery-sub-option">
                            <input type="radio" id="np-warehouse" name="novaPoshtaDeliveryType" value="warehouse" checked>
                            <label for="np-warehouse">У відділення</label>
                        </div>
                        <div class="delivery-sub-option">
                            <input type="radio" id="np-postomat" name="novaPoshtaDeliveryType" value="postomat">
                            <label for="np-postomat">У поштомат</label>
                        </div>
                        <div class="delivery-sub-option">
                            <input type="radio" id="np-courier" name="novaPoshtaDeliveryType" value="courier">
                            <label for="np-courier">Кур'єром</label>
                        </div>

                        <div class="np-fields-container">
                            <div class="city-search-container">
                                <input type="text" id="nova-poshta-city-input" name="novaPoshtaCity" placeholder="Введіть населений пункт" autocomplete="off">
                                <div id="city-suggestions" class="suggestions-dropdown"></div>
                            </div>
                            <select id="nova-poshta-warehouse" name="novaPoshtaWarehouse" style="display: none;"></select>
                        </div>

                        <div id="np-courier-address" style="display: none;">
                            <input type="text" name="novaPoshtaStreet" placeholder="Вулиця">
                            <div class="name-fields">
                                <input type="text" name="novaPoshtaBuilding" placeholder="Будинок">
                                <input type="text" name="novaPoshtaApartment" placeholder="Квартира">
                            </div>
                        </div>
                    </div>
                    <div class="delivery-option">
                        <input type="radio" id="ukrposhta" name="deliveryMethod" value="ukrposhta">
                        <label for="ukrposhta">Укрпошта</label>
                    </div>
                </div>

                <div class="payment-section">
                    <h4>Способ оплаты</h4>
                    <div class="payment-option">
                        <input type="radio" id="card" name="paymentMethod" value="card" checked>
                        <label for="card">Оплата картой</label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" id="cash" name="paymentMethod" value="cash">
                        <label for="cash">Оплата при получении</label>
                    </div>
                </div>

                <button type="submit" class="submit-order-btn">Place Order</button>
            </form>
        </div>
        <div class="order-summary">
            <h3>In Your Bag</h3>
            
            <div class="summary-details">
                <p>Subtotal <span id="subtotal-price">$0.00</span></p>
                <p>Shipping <span id="shipping-price">$0.00</span></p>
                <p>Estimated Tax <span id="tax-price">$0.00</span></p>
                <p class="total">Total <span id="total-price">$0.00</span></p>
            
            <div id="cart-items-summary" class="cart-items-summary">
                <!-- Cart items will be dynamically inserted here -->
            </div>
        </div>
    </div>
    <script src="/static/js/checkout.js"></script>
</body>
</html>
