<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_bag" />
    <script src="/static/js/i18n.js" defer></script>
</head>
<body>
    <section id="header">
        <a href="/"><img src="/static/photos/logo.jpg" class="logo" alt="logo"></a>
        <div style="display: flex; align-items: center;">
            <div>
                <ul id="navbar">
                    <li><a href="/" data-i18n-key="home">Home</a></li>
                    <li><a href="home.html" data-i18n-key="products">Products</a></li>
                    <li><a href="about.html" class="active" data-i18n-key="about">About</a></li>
                    <li><a href="contact.html" data-i18n-key="contact">Contact</a></li>
                     <div class="language-switcher-container">
                        <div class="current-lang">
                            <span id="activeLang">UA</span>
                        </div>
                        <div class="language-dropdown" id="langDropdown">
                            <span class="lang-option active" data-lang="ua">UA</span>
                            <span class="lang-option" data-lang="ru">RU</span>
                            <span class="lang-option" data-lang="en">EN</span>
                        </div>
                     </div>
                    <li class="cart-container" id="cartIcon">
                        <span class="material-symbols-outlined">
                            shopping_bag
                        </span>
                        <span id="cartCount">0</span>
                    </li>
                </ul>
            </div>
        </div>
    </section>

    <main class="container">
        <section class="about-section">
            <h1 data-i18n-key="aboutUs">About Us</h1>
            <p data-i18n-key="aboutText">Welcome to our store. We are dedicated to providing the best products and services to our customers. Our mission is to bring you high-quality items that you will love.</p>
        </section>
    </main>
    <script src="/static/js/navbar.js"></script>
</body>
</html>
