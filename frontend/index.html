<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея Одежды</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <header>
        <h1>Галерея Одежды</h1>
        <div class="cart-icon" id="cartIcon">
            🛒 <span id="cartCount">0</span>
        </div>
    </header>

    <main>
        <section class="upload-form">
            <h2>Загрузить новое фото</h2>
            <form id="uploadForm">
                <input type="file" id="fileInput" name="file" accept="image/*" required>
                <input type="text" id="descriptionInput" name="description" placeholder="Описание (необязательно)">
                <input type="number" id="priceInput" name="price" placeholder="Цена" required min="0" step="0.01">
                <button type="submit">Загрузить</button>
            </form>
        </section>

        <section class="gallery">
            <h2>Галерея</h2>
            <div id="galleryContainer" class="gallery-container">
                <!-- Фотографии будут загружены сюда с помощью JavaScript -->
            </div>
        </section>
    </main>

    <!-- Модальное окно корзины (скрыто по умолчанию) -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Корзина</h2>
            <div id="cartItems"></div>
            <p><strong>Итого:</strong> $<span id="cartTotal">0.00</span></p>
            <button id="checkoutButton">Оформить заказ</button>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
