<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пижамы</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_bag" />
    <script src="/static/js/i18n.js" defer></script>
</head>
</head>
<body>
    <section id="header">
        <a href="/"><img src="/static/photos/logo.jpg" class="logo" alt="logo"></a>
        <div style="display: flex; align-items: center;">  
            <div>
                <ul id="navbar">
                    <li><a href="/" data-i18n-key="home">Home</a></li>
                    <li><a href="home.html" class="active" data-i18n-key="products">Products</a></li>
                    <li><a href="about.html" data-i18n-key="about">About</a></li>
                    <li><a href="contact.html" data-i18n-key="contact">Contact</a></li>
                     <div class="language-switcher-container">
                        <div class="current-lang">
                            <span id="activeLang">UA</span>
                        </div>

                        <div class="language-dropdown" id="langDropdown">
                            <span class="lang-option active" data-lang="ua">UA</span>
                            <span class="lang-option" data-lang="ru">RU</span>
                            <span class="lang-option" data-lang="en">EN</span>
                        </div>
                     </div>
                     <li class="cart-container cart-icon" id="lg-bag">
                        <span class="material-symbols-outlined">
                            shopping_bag
                        </span>
                        <span id="cartCount">0</span>
                    </li>
                     <a href="#" id="close"><i class="material-symbols-outlined">close</i></a>
                </ul>
            </div>
            <div id="mobile">
                <li class="cart-container cart-icon" id="cartIcon">
                    <span class="material-symbols-outlined">
                        shopping_bag
                    </span>
                    <span id="cartCountMobile">0</span>
                </li>
                <i id="bar" class="material-symbols-outlined">menu</i>
            </div>
        </div>  
    </section>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search for items..." data-i18n-key="searchPlaceholder">
        </section>
        <section class="gallery">
            <h2 data-i18n-key="collection">Колекция</h2>
            <div id="galleryContainer" class="gallery-container">
                <!-- Фотографии будут загружены сюда с помощью JavaScript -->
            </div>
        </section>
    </main>

    <!-- Модальное окно корзины (скрыто по умолчанию) -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 data-i18n-key="cart">Корзина</h2>
            <div id="cartItems"></div>
            <p><strong data-i18n-key="total">Итого:</strong> <span id="cartTotal">0.00</span> UAH</p>
            <button id="checkoutButton" data-i18n-key="checkout">Оформить заказ</button>
        </div>
    </div>

    <script type="module" src="/static/js/home.js?v=1.1"></script>
    <script src="/static/js/navbar.js"></script>
</body>
</html>
