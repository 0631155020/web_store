<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пижамы</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <header>
        <h1 data-i18n-key="pyjamas">Пижамы</h1>
        <img src="photos/logo.jpg" alt="logo">
        <div class="controls-container">
            <div class="language-switcher">
                <span class="lang-option active" data-lang="ua">UA</span>
                <span class="lang-option" data-lang="ru">RU</span>
                <span class="lang-option" data-lang="en">EN</span>
            </div>
            <div class="cart-icon" id="cartIcon">
                🛒 <span id="cartCount">0</span>
            </div>
        </div>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search for items..." data-i18n-key="searchPlaceholder">
        </section>
        <section class="gallery">
            <h2 data-i18n-key="collection">Колекция</h2>
            <div id="galleryContainer" class="gallery-container">
                <!-- Фотографии будут загружены сюда с помощью JavaScript -->
            </div>
        </section>
    </main>

    <!-- Модальное окно корзины (скрыто по умолчанию) -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 data-i18n-key="cart">Корзина</h2>
            <div id="cartItems"></div>
            <p><strong data-i18n-key="total">Итого:</strong> $<span id="cartTotal">0.00</span></p>
            <button id="checkoutButton" data-i18n-key="checkout">Оформить заказ</button>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 data-i18n-key="details">Детали</h2>
            <div id="detailsContent"></div>
        </div>
    </div>

    <script src="/static/js/home.js?v=1.1"></script>
    <script src="/static/js/i18n.js"></script>
</body>
</html>
