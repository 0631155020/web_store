<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_bag" />
    <script src="/static/js/i18n.js" defer></script>
    <style>
        .contact-section {
            padding: 50px 20px;
            text-align: center;
        }
        .contact-section h2 {
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .contact-link {
            display: inline-block;
            padding: 15px 25px;
            background-color: #ff6600;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2rem;
            transition: background-color 0.3s;
        }
        .contact-link:hover {
            background-color: #e65c00;
        }
    </style>
</head>
<body>
    <section id="header">
        <a href="/"><img src="/static/photos/logo.jpg" class="logo" alt="logo"></a>
        <div style="display: flex; align-items: center;">
            <div>
                <ul id="navbar">
                    <li><a href="/" data-i18n-key="home">Home</a></li>
                    <li><a href="home.html" data-i18n-key="products">Products</a></li>
                    <li><a href="about.html" data-i18n-key="about">About</a></li>
                    <li><a href="contact.html" class="active" data-i18n-key="contact">Contact</a></li>
                     <div class="language-switcher-container">
                        <div class="current-lang">
                            <span id="activeLang">UA</span>
                        </div>
                        <div class="language-dropdown" id="langDropdown">
                            <span class="lang-option active" data-lang="ua">UA</span>
                            <span class="lang-option" data-lang="ru">RU</span>
                            <span class="lang-option" data-lang="en">EN</span>
                        </div>
                     </div>
                    <li class="cart-container" id="cartIcon">
                        <span class="material-symbols-outlined">
                            shopping_bag
                        </span>
                        <span id="cartCount">0</span>
                    </li>
                </ul>
            </div>
        </div>
    </section>

    <main>
        <section class="contact-section">
            <h2 data-i18n-key="contactUs">Contact Us</h2>
            <div class="contact-links">
                <a href="https://t.me/pajamas585" target="_blank" class="contact-link" data-i18n-key="telegram">Telegram Group</a>
                <a href="https://invite.viber.com/?g2=AQBmmytR1u%2FKA1WFaVOAqVdLYJr6MtSO49TYCZBWQTdlctspsZeCU96b9U4rv7tQ" target="_blank" class="contact-link" data-i18n-key="viber">Viber Group</a>
                <a href="https://www.instagram.com/pajamas585?igsh=ZTdwNjZxYnJtNXJm" target="_blank" class="contact-link" data-i18n-key="instagram">Instagram</a>
                <a href="https://www.tiktok.com/@pajamas585?_r=1&_t=ZM-91pqRasQedg" target="_blank" class="contact-link" data-i18n-key="tiktok">TikTok</a>
            </div>
        </section>
    </main>

    <script src="/static/js/navbar.js"></script>
</body>
</html>
