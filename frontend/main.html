<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_bag" />
</head>
<body>
    <section id="header">
        <a href="/"><img src="/static/photos/logo.jpg" class="logo" alt="logo"></a>
        <div style="display: flex; align-items: center;">  
            <div>
                <ul id="navbar">
                    <li><a href="/" class="active">Home</a></li>
                    <li><a href="home.html">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                     <div class="language-switcher-container">
                        <div class="current-lang">
                            <span id="activeLang">UA</span>
                        </div>

                        <div class="language-dropdown" id="langDropdown">
                            <span class="lang-option active" data-lang="ua">UA</span>
                            <span class="lang-option" data-lang="ru">RU</span>
                            <span class="lang-option" data-lang="en">EN</span>
                        </div>
                     </div>
                    <li class="cart-container" id="cartIcon">
                        <span class="material-symbols-outlined">
                            shopping_bag
                        </span>
                        <span id="cartCount">0</span>
                    </li>
                </ul>
            </div>

           
        </div>  
    </section>

    <section id="hero">
        <h4>Trade-in-offer</h4>
        <h2>Super value deals</h2>
        <h1>On all products</h1>
        <p>Save more with coupons & up to 70% off!</p>
        <a href="home.html"><button>Shop Now &#8594;</button></a>
    </section>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search for items..." data-i18n-key="searchPlaceholder">
        </section>
        <section class="gallery">
            <h2 data-i18n-key="collection">Колекция</h2>
            <div id="galleryContainer" class="gallery-container">
                <!-- Фотографии будут загружены сюда с помощью JavaScript -->
            </div>
        </section>
    </main>

    <!-- Модальное окно корзины (скрыто по умолчанию) -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 data-i18n-key="cart">Корзина</h2>
            <div id="cartItems"></div>
            <p><strong data-i18n-key="total">Итого:</strong> $<span id="cartTotal">0.00</span></p>
            <button id="checkoutButton" data-i18n-key="checkout">Оформить заказ</button>
        </div>
    </div>

    <script type="module" src="/static/js/home.js?v=1.1"></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/navbar.js"></script>
    <script>
        const links = document.querySelectorAll('#navbar a');
        links.forEach(link => {
            if (link.href === window.location.href || 
                (window.location.pathname === '/' && link.getAttribute('href') === 'main.html')) {
                link.classList.add('active');
            }
    });
    </script>
</body>
</html>
