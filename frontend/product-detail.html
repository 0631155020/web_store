<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_bag" />
</head>
<body>
    <section id="header">
        <a href="/"><img src="/static/photos/logo.jpg" class="logo" alt="logo"></a>
        <div style="display: flex; align-items: center;">  
            <div>
                <ul id="navbar">
                    <li><a href="/">Home</a></li>
                    <li><a href="home.html" class="active">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                     <div class="language-switcher-container">
                        <div class="current-lang">
                            <span id="activeLang">UA</span>
                        </div>

                        <div class="language-dropdown" id="langDropdown">
                            <span class="lang-option active" data-lang="ua">UA</span>
                            <span class="lang-option" data-lang="ru">RU</span>
                            <span class="lang-option" data-lang="en">EN</span>
                        </div>
                     </div>
                     <li class="cart-container" id="lg-bag">
                        <span class="material-symbols-outlined">
                            shopping_bag
                        </span>
                        <span id="cartCount">0</span>
                    </li>
                     <a href="#" id="close"><i class="material-symbols-outlined">close</i></a>
                </ul>
            </div>
            <div id="mobile">
                <li class="cart-container" id="cartIcon">
                    <span class="material-symbols-outlined">
                        shopping_bag
                    </span>
                    <span id="cartCountMobile">0</span>
                </li>
                <i id="bar" class="material-symbols-outlined">menu</i>
            </div>           
        </div>  
    </section>

    <main id="product-detail-container" class="container">
        <!-- Product details will be loaded here dynamically -->
    </main>

    <!-- Cart Modal (same as on home page) -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 data-i18n-key="cart">Cart</h2>
            <div id="cartItems"></div>
            <p><strong data-i18n-key="total">Total:</strong> $<span id="cartTotal">0.00</span></p>
            <button id="checkoutButton" data-i18n-key="checkout">Checkout</button>
        </div>
    </div>
    <script type="module" src="/static/js/product-detail.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/navbar.js"></script>
</body>
</html>
