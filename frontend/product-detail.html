<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1 data-i18n-key="pyjamas">Pyjamas</h1>
        <div class="controls-container">
            <div class="language-switcher">
                <span class="lang-option active" data-lang="ua">UA</span>
                <span class="lang-option" data-lang="ru">RU</span>
                <span class="lang-option" data-lang="en">EN</span>
            </div>
            <div class="cart-icon" id="cartIcon">
                🛒 <span id="cartCount">0</span>
            </div>
        </div>
    </header>

    <main id="product-detail-container">
        <!-- Product details will be loaded here by JavaScript -->
    </main>

    <!-- Cart Modal (same as on home page) -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 data-i18n-key="cart">Cart</h2>
            <div id="cartItems"></div>
            <p><strong data-i18n-key="total">Total:</strong> $<span id="cartTotal">0.00</span></p>
            <button id="checkoutButton" data-i18n-key="checkout">Checkout</button>
        </div>
    </div>
    <script type="module" src="/static/js/product-detail.js"></script>
    <script src="/static/js/i18n.js"></script>
</body>
</html>
