events {}
http {
    server {
        listen 80;

        # Serve static files and the main index.html
        location / {
            root   /usr/share/nginx/html;
            index  main.html;
            try_files $uri $uri/ /main.html;
        }

        # The HTML files request assets from /static/, but the files exist
        # in the root of the mounted volume. This alias tells Nginx to
        # look in /usr/share/nginx/html for files requested under /static.
        # e.g., /static/css/style.css -> /usr/share/nginx/html/css/style.css
        location /static/ {
            alias /usr/share/nginx/html/;
        }

        # Proxy API requests to the backend service
        location /api/ {
            proxy_pass http://backend:8000;
        }

        # Proxy image uploads to the backend service
        location /uploads/ {
             proxy_pass http://backend:8000;
        }
    }
}
